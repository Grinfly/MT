name: Daily Keepalive Commit

on:
  push:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config git
        run: |
          git config user.name "github-actions" >/dev/null 2>&1
          git config user.email "github-actions@github.com" >/dev/null 2>&1

      - name: Empty commit & push
        run: |
          git commit --allow-empty -m "chore: keepalive"
          git push